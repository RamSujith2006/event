<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .gallery-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .gallery-header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .photo-item {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* 4:3 aspect ratio */
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .photo-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .photo-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .no-photos {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin-top: 3rem;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin-top: 3rem;
        }
        
        /* Modal for full-size view */
        .photo-modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }
        
        .photo-modal-content {
            position: relative;
            margin: 5% auto;
            padding: 0;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .photo-modal-content img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .photo-modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .photo-modal-close:hover {
            color: #bbb;
        }
        
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }
            
            .gallery-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="gallery-header">
            <h1>Photo Gallery</h1>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
        
        <div id="loadingMessage" class="loading">Loading photos...</div>
        <div id="photoGrid" class="photo-grid" style="display: none;"></div>
        <div id="noPhotosMessage" class="no-photos" style="display: none;">No photos available.</div>
    </div>
    
    <!-- Photo Modal -->
    <div id="photoModal" class="photo-modal">
        <div class="photo-modal-content">
            <span class="photo-modal-close" onclick="closePhotoModal()">&times;</span>
            <img id="modalImage" src="" alt="Full size photo">
        </div>
    </div>
    
    <script>
        async function loadPhotos() {
            try {
                const response = await fetch('/api/media/photo');
                const photos = await response.json();
                
                const loadingMessage = document.getElementById('loadingMessage');
                const photoGrid = document.getElementById('photoGrid');
                const noPhotosMessage = document.getElementById('noPhotosMessage');
                
                loadingMessage.style.display = 'none';
                
                if (photos.length === 0) {
                    noPhotosMessage.style.display = 'block';
                    return;
                }
                
                photoGrid.innerHTML = '';
                
                photos.forEach(photo => {
                    const photoItem = document.createElement('div');
                    photoItem.className = 'photo-item';
                    photoItem.onclick = () => openPhotoModal(photo.filename);
                    
                    const img = document.createElement('img');
                    img.src = `/uploads/photos/${photo.filename}`;
                    img.alt = photo.originalName || 'Photo';
                    img.loading = 'lazy';
                    
                    photoItem.appendChild(img);
                    photoGrid.appendChild(photoItem);
                });
                
                photoGrid.style.display = 'grid';
                
            } catch (error) {
                console.error('Error loading photos:', error);
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('noPhotosMessage').style.display = 'block';
                document.getElementById('noPhotosMessage').textContent = 'Error loading photos.';
            }
        }
        
        function openPhotoModal(filename) {
            const modal = document.getElementById('photoModal');
            const modalImage = document.getElementById('modalImage');
            
            modalImage.src = `/uploads/photos/${filename}`;
            modal.style.display = 'block';
        }
        
        function closePhotoModal() {
            document.getElementById('photoModal').style.display = 'none';
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('photoModal');
            if (event.target === modal) {
                closePhotoModal();
            }
        }
        
        // Close modal with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closePhotoModal();
            }
        });
        
        // Load photos when page loads
        document.addEventListener('DOMContentLoaded', loadPhotos);
    </script>
</body>
</html>
